<div class="chat-input-wrapper">
  <div class="chat-input-container">
    <!-- Attachment Button Placeholder -->
    <!-- <button class="action-btn" type="button" aria-label="Attach file" title="Attach file (coming soon)">
      <i class="fas fa-paperclip"></i>
    </button> -->

    <!-- Textarea -->
    <textarea
      #textarea
      class="chat-input-textarea"
      placeholder="Message SaraAI..."
      rows="1"
      [value]="inputValue()"
      (input)="onInput($event)"
      (keydown)="onKeyDown($event)"
      aria-label="Chat input message"
    ></textarea>

    <div class="flex items-center gap-1 input-actions-right">
      <!-- Microphone Button Placeholder -->
      <!-- <button class="action-btn" type="button" aria-label="Use voice input" title="Voice input (coming soon)">
        <i class="fas fa-microphone"></i>
      </button> -->

      <!-- Conditionally render Send or Pause/Stop Button -->
      @if (isTyping()) {
        <!-- Pause/Stop Button -->
        <button
          class="send-btn stop-btn"
          type="button"
          (click)="onStop()"
          aria-label="Stop generating"
          title="Stop generating"
        >
          <i class="fas fa-stop"></i>
        </button>
      } @else {
        <!-- Send Button -->
        <button
          class="send-btn"
          type="button"
          (click)="triggerSend()"
          [disabled]="!inputValue().trim()"
          aria-label="Send message"
        >
          <i class="fas fa-paper-plane"></i>
        </button>
      }
    </div>
  </div>
  <div class="input-info-text">SaraAI can make mistakes. Verify important info.</div>
</div>
