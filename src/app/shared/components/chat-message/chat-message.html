<div class="flex gap-3 message-item" [class.user-message]="isUser" [class.assistant-message]="!isUser">
  <!-- Avatar -->
  <div class="flex items-center justify-center avatar-container" aria-hidden="true">
    @if (isUser) {
      <!-- User Initials / Icon -->
      <span class="user-initials">U</span>
    } @else {
      <!-- SaraAI Icon -->
      <i class="fas fa-leaf assistant-logo"></i>
    }
  </div>

  <!-- Content Bubble -->
  <div class="flex flex-col message-content-wrapper">
    <div class="bubble">
      <div [innerHTML]="htmlContent"></div>
    </div>
    <span class="timestamp" [attr.aria-label]="'Sent at ' + (message().timestamp | date:'shortTime')">
      {{ message().timestamp | date:'h:mm a' }}
    </span>
  </div>
</div>
