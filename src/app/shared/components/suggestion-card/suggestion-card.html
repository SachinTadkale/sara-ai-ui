<button class="suggestion-card-btn" (click)="onClick()" type="button">
  <div class="card-left-section">
    <div class="icon-badge">
      @switch (icon()) {
        @case ('lock') {
          <i class="fas fa-lock suggestion-icon"></i>
        }
        @case ('code') {
          <i class="fas fa-code suggestion-icon"></i>
        }
        @case ('file-text') {
          <i class="fas fa-file-alt suggestion-icon"></i>
        }
        @case ('map') {
          <i class="fas fa-map-marked-alt suggestion-icon"></i>
        }
      }
    </div>
    
    <div class="card-text-container">
      <h3 class="card-title">{{ title() }}</h3>
      <p class="card-description">{{ description() }}</p>
    </div>
  </div>

  <i class="fas fa-arrow-right arrow-icon"></i>
</button>
